version: "3"

services:
    code2docs-backend:
        build: .
        working_dir: /backend/
        image: kallenl/code2docs-backend-dev-main:latest
        command: sh -c "uvicorn src.main:app --reload --port=8000 --host=0.0.0.0"
        ports:
            - 8000:8000
        env_file: ".env"
        volumes:
            - ./src:/backend/src
        restart: on-failure

