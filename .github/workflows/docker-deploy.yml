name: CI/CD Pipeline
on:
  push:
    branches: [dev-docker]
  workflow_call:
    secrets:
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_ACCESS_TOKEN:
        required: true
      DOCKER_IMAGE_NAME:
        required: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/code2docs-backend:latest ./backend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/code2docs-backend:latest

        # uses: docker/build-push-action@v2
        # with:
        #   context: ./backend
        #   push: true
        #   tags: code2docs-backend