name: backend deployment
on:
  push:
    branches: [dev]
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_DEFAULT_REGION:
        required: true
      LAMBDA_FUNCTION_NAME:
        required: true
      BUCKET_NAME:
        required: true
  
jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install python-multipart
          pip install pyjwt[crypto]

      - name: Install dependencies & move the server code inside the dependencies
        run: |
          pip3 install -t dependencies -r ./backend/requirements.txt python-multipart pyjwt[crypto]
          cp -a ./backend ./dependencies

      - name: Zip the dependencies
        run: |
          (cd dependencies; zip -r9 backend.zip -r .)

      - name: Upload zip file artifact
        uses: actions/upload-artifact@v3
        with:
          name: backend
          path: ./dependencies/backend.zip



